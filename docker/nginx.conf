# =============================================================================
# Smithy AI — Nginx Reverse Proxy Configuration
# =============================================================================
# SSL termination, rate limiting, gzip compression, static file caching,
# and proxy pass to the NestJS API.
#
# Prerequisites:
#   - Place SSL certificates in docker/certs/:
#       docker/certs/server.crt
#       docker/certs/server.key
#   - Or use certbot to generate Let's Encrypt certificates.
# =============================================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # --- Logging -----------------------------------------------------------
    log_format json_combined escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"request":"$request",'
            '"status":$status,'
            '"body_bytes_sent":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"http_referer":"$http_referer",'
            '"http_user_agent":"$http_user_agent"'
        '}';
    access_log /var/log/nginx/access.log json_combined;

    # --- Performance -------------------------------------------------------
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50m;

    # --- Rate Limiting -----------------------------------------------------
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=static:10m rate=60r/s;

    # --- Gzip Compression --------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/x-javascript
        image/svg+xml;

    # --- Upstream ----------------------------------------------------------
    upstream api_backend {
        server api:3000;
    }

    # --- HTTP → HTTPS Redirect ---------------------------------------------
    server {
        listen 80;
        server_name _;

        # Health check endpoint (no SSL required)
        location /health {
            proxy_pass http://api_backend/health;
            proxy_set_header Host $host;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # --- HTTPS Server -------------------------------------------------------
    server {
        listen 443 ssl;
        http2 on;
        server_name _;

        # SSL Configuration — replace with your own certs or use certbot
        ssl_certificate /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security headers
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;

        # --- Static Web App ------------------------------------------------
        location / {
            limit_req zone=static burst=30 nodelay;
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;

            # Cache hashed assets (Vite adds content hashes to filenames)
            location ~* \.[0-9a-f]{8,}\.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
                expires 1y;
                add_header Cache-Control "public, max-age=31536000, immutable" always;
                access_log off;
            }
        }

        # --- API Proxy -----------------------------------------------------
        location /api {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }

        # --- Socket.IO WebSocket Proxy ------------------------------------
        location /socket.io {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s;
        }

        # --- Health Check --------------------------------------------------
        location /health {
            proxy_pass http://api_backend/health;
            proxy_set_header Host $host;
        }
    }
}
