name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_ENV: test
  DATABASE_URL: postgresql://smithy:smithy@localhost:5432/smithy
  REDIS_URL: redis://localhost:6379
  RABBITMQ_URL: amqp://smithy:smithy@localhost:5672
  MINIO_ENDPOINT: http://localhost:9000
  MINIO_ACCESS_KEY: smithy
  MINIO_SECRET_KEY: smithy_secret
  MINIO_BUCKET: smithy
  JWT_SECRET: ci-test-secret-not-for-production
  APP_PORT: "3000"
  CORS_ORIGIN: http://localhost:5173
  LOG_LEVEL: warn
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm turbo lint

      - run: pnpm turbo typecheck

  test:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Start Docker Compose services
        run: docker compose -f docker/docker-compose.yml up -d --wait postgres redis rabbitmq minio && docker compose -f docker/docker-compose.yml run --rm minio-init

      - run: pnpm turbo test

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: "**/coverage/"
          retention-days: 7

  e2e:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('apps/web/package.json') }}

      - name: Install Playwright browsers
        run: pnpm --filter web exec playwright install --with-deps chromium

      - name: Start Docker Compose services
        run: docker compose -f docker/docker-compose.yml up -d --wait postgres redis rabbitmq minio && docker compose -f docker/docker-compose.yml run --rm minio-init

      - name: Build shared packages
        run: pnpm turbo build --filter=api...

      - name: Run database migrations
        run: pnpm --filter api db:migrate

      - name: Start API server
        run: pnpm --filter api dev &

      - name: Start web dev server
        run: pnpm --filter web dev &

      - name: Wait for servers
        run: npx wait-on tcp:3000 http://localhost:5173 --timeout 60000

      - name: Run E2E tests
        run: pnpm --filter web e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7
