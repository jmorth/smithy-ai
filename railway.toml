# =============================================================================
# Smithy — Railway Deployment Configuration
# =============================================================================
#
# This file configures the Smithy API service for deployment on Railway.
# Railway builds from the repository root using Docker.
#
# =============================================================================
# Project Setup Steps
# =============================================================================
#
# 1. Create a new Railway project:
#      railway init
#
# 2. Provision PostgreSQL:
#      Railway dashboard → New → Database → PostgreSQL
#      (DATABASE_URL is auto-injected by Railway)
#
# 3. Provision Redis:
#      Railway dashboard → New → Database → Redis
#      (REDIS_URL is auto-injected by Railway)
#
# 4. Provision RabbitMQ via CloudAMQP plugin:
#      Railway dashboard → New → Plugin → CloudAMQP
#      CloudAMQP free tier (Little Lemur) provides a managed RabbitMQ instance.
#      Copy the AMQP URL from CloudAMQP dashboard into RABBITMQ_URL env var.
#      Alternatively, deploy rabbitmq:3-management-alpine as a custom Docker
#      service in your Railway project.
#
# 5. Configure S3-compatible storage:
#      Use AWS S3, Cloudflare R2, or any S3-compatible provider.
#      Set the following environment variables in Railway dashboard:
#        S3_ENDPOINT    — S3-compatible storage endpoint URL
#        S3_ACCESS_KEY  — S3 access key ID
#        S3_SECRET_KEY  — S3 secret access key
#        S3_BUCKET      — S3 bucket name (default: smithy)
#
# 6. Set environment variables in Railway dashboard for the API service
#      (see Environment Variables section below)
#
# 7. Deploy:
#      railway up            (manual deploy from CLI)
#      — or —
#      Push to main branch   (auto-deploy via Railway GitHub integration)
#
# =============================================================================
# Multi-Service Deployment Notes
# =============================================================================
#
# Railway's railway.toml configures the primary (API) service. For the web
# frontend, you have two options:
#
#   Option A — Separate Railway service:
#     Create a second service in your Railway project pointing to the same
#     repo. Override the build command to: pnpm --filter web build
#     Set the publish directory to: apps/web/dist
#     Railway will serve it as a static site.
#
#   Option B — External static hosting (recommended):
#     Deploy the web app to Vercel, Netlify, or Cloudflare Pages.
#     Build command:  pnpm --filter web build
#     Output dir:     apps/web/dist
#     Set VITE_API_URL env var to point to the Railway API service URL.
#
# =============================================================================
# Environment Variables (set in Railway dashboard, NOT in this file)
# =============================================================================
#
# DATABASE_URL        — PostgreSQL connection string
#                       (auto-set by Railway PostgreSQL plugin)
# REDIS_URL           — Redis connection string
#                       (auto-set by Railway Redis plugin)
# RABBITMQ_URL        — RabbitMQ AMQP connection string
#                       (from CloudAMQP plugin or custom service)
# S3_ENDPOINT         — S3-compatible storage endpoint
# S3_ACCESS_KEY       — S3 access key ID
# S3_SECRET_KEY       — S3 secret access key
# S3_BUCKET           — S3 bucket name (default: smithy)
# JWT_SECRET          — JWT signing secret (for authentication)
# NODE_ENV            — Set to "production"
# PORT                — Auto-set by Railway (do not override)
#
# =============================================================================

[build]
# Railway builds from repo root — use the API Dockerfile for multi-stage build
dockerfilePath = "apps/api/Dockerfile"

[deploy]
startCommand = "node apps/api/dist/main.js"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
